
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);padding:0;color:var(--color-text-primary)}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.top{display:flex;gap:0;border-bottom:1px solid var(--color-border-tertiary);margin-bottom:0;overflow-x:auto}
.ttab{padding:10px 14px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--color-text-secondary);border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.ttab:hover:not(.active){background:var(--color-background-secondary)}
.ttab.active{color:var(--color-text-primary);border-bottom-color:var(--color-text-primary)}
.panel{display:none;padding:16px}
.panel.active{display:block}
.stage-list{display:flex;flex-direction:column;gap:10px}
.stage{border:0.5px solid var(--color-border-tertiary);border-radius:12px;overflow:hidden}
.stage-head{display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer;background:var(--color-background-secondary)}
.stage-head:hover{background:var(--color-background-tertiary)}
.stage-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0;color:var(--color-text-info);background:var(--color-background-info);border:0.5px solid var(--color-border-info)}
.stage-title{font-size:13px;font-weight:500;flex:1}
.stage-meta{display:flex;align-items:center;gap:8px}
.dur{font-size:11px;color:var(--color-text-tertiary);background:var(--color-background-tertiary);padding:2px 8px;border-radius:10px}
.chev{font-size:10px;color:var(--color-text-tertiary);transition:transform .2s}
.chev.open{transform:rotate(180deg)}
.stage-body{display:none;padding:14px;border-top:0.5px solid var(--color-border-tertiary)}
.stage-body.open{display:block}
.task-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
@media(max-width:480px){.task-grid{grid-template-columns:1fr}}
.task{background:var(--color-background-secondary);border-radius:8px;padding:10px 12px;border:0.5px solid var(--color-border-tertiary)}
.task-label{font-size:11px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.task-desc{font-size:11px;color:var(--color-text-secondary);line-height:1.5}
.pill{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:500}
.p-db{background:var(--color-background-info);color:var(--color-text-info)}
.p-bot{background:var(--color-background-warning);color:var(--color-text-warning)}
.p-api{background:var(--color-background-success);color:var(--color-text-success)}
.p-ui{background:var(--color-background-danger);color:var(--color-text-danger)}
.p-new{background:var(--color-background-success);color:var(--color-text-success)}
.note{background:var(--color-background-warning);border:0.5px solid var(--color-border-warning);border-radius:8px;padding:10px 12px;font-size:11px;color:var(--color-text-warning);margin-top:10px;line-height:1.5}
.dep-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.dep{display:flex;align-items:flex-start;gap:8px;font-size:11px;color:var(--color-text-secondary)}
.dep-dot{width:6px;height:6px;border-radius:50%;background:var(--color-text-tertiary);flex-shrink:0;margin-top:4px}
.dep b{color:var(--color-text-primary);font-weight:500}
.role-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:440px){.role-cards{grid-template-columns:1fr}}
.rcard{border:0.5px solid var(--color-border-tertiary);border-radius:10px;padding:12px;background:var(--color-background-secondary)}
.rcard-title{font-size:13px;font-weight:500;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.rcard-list{display:flex;flex-direction:column;gap:4px}
.ritem{font-size:11px;color:var(--color-text-secondary);line-height:1.4;padding-left:12px;position:relative}
.ritem::before{content:"•";position:absolute;left:0;color:var(--color-text-tertiary)}
.ritem b{color:var(--color-text-primary);font-weight:500}
.new-tag{display:inline-block;background:var(--color-background-success);color:var(--color-text-success);font-size:9px;font-weight:500;padding:1px 5px;border-radius:3px;vertical-align:middle;margin-left:4px}
.section-label{font-size:10px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.06em;margin:14px 0 8px}
.logic-list{display:flex;flex-direction:column;gap:8px}
.logic-item{border:0.5px solid var(--color-border-tertiary);border-radius:8px;padding:10px 12px;background:var(--color-background-secondary)}
.logic-title{font-size:12px;font-weight:500;color:var(--color-text-primary);margin-bottom:6px}
.logic-desc{font-size:11px;color:var(--color-text-secondary);line-height:1.55}
.logic-tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:500;margin-bottom:6px}
.t-admin{background:#EEEDFE;color:#26215C}
.t-bot{background:#FAEEDA;color:#412402}
.t-auto{background:#EAF3DE;color:#173404}
.t-db{background:#E6F1FB;color:#042C53}
.t-courier{background:#FAECE7;color:#4A1B0C}
.stat-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.stat{background:var(--color-background-secondary);border-radius:8px;padding:10px 14px;flex:1;min-width:80px;text-align:center;border:0.5px solid var(--color-border-tertiary)}
.stat-n{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.stat-l{font-size:10px;color:var(--color-text-tertiary);margin-top:2px}
.toggle-area{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.toggle-label{font-size:12px;color:var(--color-text-secondary)}
.toggle-btn{padding:5px 12px;border-radius:6px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-secondary);font-size:11px;cursor:pointer}
.toggle-btn.on{background:var(--color-background-success);border-color:var(--color-border-success);color:var(--color-text-success)}
</style>

<script>
var stages=[
{num:1,title:"Backend asosi — DB + API",dur:"7-9 kun",tasks:[
  {label:"DB sxemasi",cls:"p-db",desc:"users, products, categories, orders, order_items, couriers, delivery_zones, promos, coins, feedbacks — to'liq migratsiyalar"},
  {label:"Auth tizimi",cls:"p-api",desc:"JWT, rollar: client, admin, operator, courier, driver. Har rol uchun middleware guard"},
  {label:"Mahsulot API",cls:"p-api",desc:"CRUD + kategoriya + birlik tipi (kg/dona). Premium/oddiy narx. Stock boshqaruv"},
  {label:"Zakaz API",cls:"p-api",desc:"Yaratish, status o'zgartirish, kuryer tayinlash. Naqd + 20km+ logikasi"},
  {label:"Yetkazish hisob",cls:"p-api",desc:"GPS masofa → zona → narx avtomatik hisoblash. Admin dan km narxini sozlash. On/off toggle"},
  {label:"Redis setup",cls:"p-db",desc:"Sessiyalar, OTP, rate limiter, bot FSM holatlari"},
],note:"Bu bosqich barcha qolgan bosqichlar uchun poydevor. Sxema to'g'ri bo'lmasa keyingi hamma narsa buziladi.",deps:[
  {b:"Schema:",v:"orders.status enum: pending_confirm, confirmed, preparing, on_delivery, delivered, cancelled"},
  {b:"Delivery:",v:"delivery_settings jadvali: price_per_km, free_threshold, max_distance, is_enabled — admin paneldan boshqariladi"},
  {b:"Units:",v:"products.unit_type: 'kg' | 'piece' — zakaz items da quantity mos hisoblanadi"},
]},
{num:2,title:"Telegram Bot — barcha rollar",dur:"8-10 kun",tasks:[
  {label:"Klient oqimi",cls:"p-bot",desc:"Start → Web App → checkout → tel/geo → to'lov → status kuzatish. Premium/coin/promo checkout da"},
  {label:"Admin bot",cls:"p-bot",desc:"Zakazlar, status, naqd tasdiq, mahsulot CRUD, hisobot, broadcast, settings"},
  {label:"Operator bot",cls:"p-bot",desc:"Yangi zakazlar feed, naqd tasdiqlash, kuryer yo'naltirish, qo'lda zakaz kiritish"},
  {label:"Kuryer bot",cls:"p-bot",desc:"Yangi zakazlar → qabul → GPS → yetkazildi → naqd olindi. Kunlik hisobot"},
  {label:"Shofer roli",cls:"p-bot",desc:"Kuryerga o'xshash oqim. Farqi: faqat zakazlarni ko'radi/yetkazadi. Alohida guruhga xabar"},
  {label:"FSM + Redis",cls:"p-db",desc:"Har rol uchun alohida FSM holatlari. Session TTL 2 soat"},
],note:"Admin va operator botni alohida xususiy chatda ochish mumkin. Guruh xabarlari admin guruhiga + operator guruhiga alohida ketadi.",deps:[
  {b:"Bot arxitektura:",v:"Router middleware → rol tekshiruv → handler. Har rolga alohida router fayli"},
  {b:"Guruhlar:",v:"3 ta guruh: admin_group_id, operator_group_id, courier_group_id — .env da"},
  {b:"Xabar formati:",v:"Har zakaz uchun unikal message_id saqlanadi — keyinchalik tahrirlash uchun"},
]},
{num:3,title:"Web App (Telegram Mini App)",dur:"5-7 kun",tasks:[
  {label:"Home + Katalog",cls:"p-ui",desc:"Rasmda ko'rgandek UI. Qizil/qora MEATZONE stili. Kategoriya grid + mahsulot grid"},
  {label:"Savat + Checkout",cls:"p-ui",desc:"Miqdor (kg/dona), promo-kod, coin sarflash, yetkazish narxi preview"},
  {label:"Profil sahifa",cls:"p-ui",desc:"Zakaz tarixi, coin balans, premium holat, promo-kodlar"},
  {label:"To'lov integratsiya",cls:"p-ui",desc:"Click/Payme checkout URL → webhook → bot xabar. Naqd = admin tasdiq kerak"},
  {label:"WebApp API",cls:"p-api",desc:"Telegram.WebApp.sendData() orqali bot bilan muloqot. initData validatsiya"},
  {label:"Geo hisoblash",cls:"p-ui",desc:"User lokatsiya → Haversine formula → km → narx. Ko'rsatish checkout da"},
],note:"Web App bitta HTML/JS fayl. Telegram CDN ga yuklanadi. Barcha API call bot backend orqali — CORS muammosi yo'q.",deps:[
  {b:"Og'irlik tizimi:",v:"Slider: 0.1 kg dan 10 kg gacha. Dona: integer spinner. Unit type product dan keladi"},
  {b:"Coin UI:",v:"Checkout da coin balans ko'rsatiladi. Checkbox bilan qo'llash: max 30% zakaz summasi"},
]},
{num:4,title:"Admin Panel (Web)",dur:"5-6 kun",tasks:[
  {label:"Zakazlar sahifa",cls:"p-ui",desc:"Jadval: filter (status, sana, to'lov, kuryer), qidiruv. Har zakaz batafsil modal"},
  {label:"Mahsulot CRUD",cls:"p-ui",desc:"Qo'shish/tahrirlash/o'chirish. Rasm yuklash, kategoriya, birlik tipi, narx"},
  {label:"Hisobot sahifa",cls:"p-ui",desc:"Kunlik/haftalik/oylik savdo, foyda, top mahsulotlar, kuryer statistikasi. Bir sahifada"},
  {label:"Sozlamalar",cls:"p-ui",desc:"Km narxi, bepul yetkazish chegarasi, max masofa, naqd on/off, ish vaqti, promo"},
  {label:"Xodimlar",cls:"p-ui",desc:"Admin/operator/kuryer/shofer qo'shish-o'chirish. Telefon, login, parol"},
  {label:"Kompaniya info",cls:"p-ui",desc:"Ism, manzil, telefon, ish vaqti, logo — Web App va bot da ko'rsatiladi"},
],note:"Admin panel oddiy React SPA. Auth: JWT. Faqat admin va owner kirishi mumkin.",deps:[
  {b:"Hisobot formati:",v:"Jadval + umumiy raqamlar. CSV eksport. Filter: sana oralig'i, to'lov turi, kuryer"},
  {b:"Naqd tasdiq:",v:"Admin paneldan ham, botdan ham naqd pul qabul qilganlikni tasdiqlash imkoni"},
]},
{num:5,title:"To'lov + Webhook + SMS",dur:"3-4 kun",tasks:[
  {label:"Payme webhook",cls:"p-api",desc:"CheckPerform, Create, Perform, Cancel. HMAC signature. Idempotent qayta ishlov"},
  {label:"Click webhook",cls:"p-api",desc:"Prepare + Complete. SHA1. Zakaz summa tekshiruv"},
  {label:"Naqd logika",cls:"p-api",desc:"20km+ va naqd → admin tasdiqlashi shart. Admin bot da inline tasdiqlash"},
  {label:"SMS xabar",cls:"p-api",desc:"Har zakaz bo'yicha SMS (Play Mobile/Eskiz). Format: raqam, summa, status, kuryer"},
  {label:"Push xabarlar",cls:"p-bot",desc:"Admin broadcast: barcha/aktiv/tuman bo'yicha. Promo aksiyalar"},
  {label:"Coin webhook",cls:"p-api",desc:"Zakaz yetkazilganda coin avtomatik beriladi. Sarflash checkout da"},
],note:"SMS ga asosiy xabar: '#1042 — 83,000 so'm — Kuryer: Bobur yo'lda'. Admin xabar: 'Botdan tasdiqlang'.",deps:[
  {b:"SMS provayder:",v:"Play Mobile API (O'zbekiston uchun eng ishonchli). Har zakaz 1 SMS = ~150 so'm"},
  {b:"Coin rate:",v:"admin sozlamasidan: har 1000 so'm = N coin. 1 coin = 1 so'm chegirma. Max 30% zakaz"},
]},
{num:6,title:"Deploy + Test + Monitor",dur:"3-4 kun",tasks:[
  {label:"VPS + Nginx",cls:"p-db",desc:"Backend + Bot webhook rejimida. SSL (Let's Encrypt). PM2 process manager"},
  {label:"Web App deploy",cls:"p-ui",desc:"Vercel yoki Netlify. Bot @BotFather da Web App URL sozlash"},
  {label:"Admin panel deploy",cls:"p-ui",desc:"Vercel. Alohida subdomain: admin.meatzone.uz"},
  {label:"Monitoring",cls:"p-api",desc:"Uptime Robot — har 5 daqiqa. Sentry — xato kuzatuv. Admin Telegram xabari"},
  {label:"Zaxira",cls:"p-db",desc:"PostgreSQL dump har kecha 02:00. 30 kunlik saqlash. S3 yoki lokal"},
  {label:"Load test",cls:"p-api",desc:"50 ta bir vaqtda zakaz. Bot webhook latency. To'lov webhook idempotent test"},
],note:"Birinchi 1 oyda bepul yetkazish feature ham shu bosqichda yoqiladi va sozlanadi.",deps:[
  {b:"Bepul 1 oy:",v:"delivery_settings.free_month_end = now() + 30 days. Tugagach avtomatik narx hisoblashga o'tadi"},
]},
];

var logics=[
{tag:"20km+ naqd logikasi",cls:"t-admin",title:"Masofa va naqd to'lov birga kelganda",desc:"Klient GPS yuboradi → bot masofa hisoblaydi → 20km+ VA naqd bo'lsa → 'Admin tasdiqlashi kerak' holati. Bot admin guruhiga inline tasdiqlash xabari yuboradi. Admin tasdiqlagach operator va kuryer guruhiga o'tadi. Chegarani admin paneldan o'zgartirish mumkin (max_distance_for_cash_confirm)."},
{tag:"Kuryer tayinlash oqimi",cls:"t-courier",title:"Kim birinchi bosadi — u oladi",desc:"Zakaz operator tomonidan tayyorlangach, bot barcha bo'sh kuryerlarga xabar yuboradi. Birinchi 'Qabul qildim' bosgan kuryer zakazni oladi. Boshqalar uchun tugma o'chiriladi va 'Zakaz olindi' xabari keladi. Adminga 'Kuryer [Ism] #1042 zakazni oldi' xabari ketadi."},
{tag:"Naqd pul aylanmasi",cls:"t-admin",title:"Naqd pul to'liq kuzatув",desc:"Kuryer naqd oladi → 'Naqd olindi' belgilaydi → Adminga xabar keladi (Kuryer Bobur: +83,000 so'm). Kuryer pul topshirganda admin 'Qabul qildim' bosadi → zakaz to'liq yopiladi. Barcha naqd summa adminnikida kunlik saldo sifatida hisobotda ko'rinadi."},

function buildStages(){
  var c=document.getElementById('stages-list');
  stages.forEach(function(s,i){
    var d=document.createElement('div');d.className='stage';
    var h=document.createElement('div');h.className='stage-head';
    h.innerHTML='<div class="stage-num">'+s.num+'</div><div class="stage-title">'+s.title+'</div><div class="stage-meta"><span class="dur">'+s.dur+'</span><span class="chev" id="sc'+i+'">▼</span></div>';
    h.onclick=(function(idx){return function(){toggleStage(idx);};})(i);
    var b=document.createElement('div');b.className='stage-body';b.id='sb'+i;
    var bh='<div class="task-grid">';
    s.tasks.forEach(function(t){bh+='<div class="task"><div class="task-label"><span class="pill '+t.cls+'">'+t.cls.replace('p-','')+'</span> '+t.label+'</div><div class="task-desc">'+t.desc+'</div></div>';});
    bh+='</div>';
    if(s.note) bh+='<div class="note">'+s.note+'</div>';
    if(s.deps&&s.deps.length){bh+='<div class="section-label">Texnik qarorlar</div><div class="dep-list">';s.deps.forEach(function(d){bh+='<div class="dep"><div class="dep-dot"></div><div><b>'+d.b+'</b> '+d.v+'</div></div>';});bh+='</div>';}
    b.innerHTML=bh;
    d.appendChild(h);d.appendChild(b);c.appendChild(d);
  });
}

function toggleStage(i){
  var b=document.getElementById('sb'+i);
  var c=document.getElementById('sc'+i);
  var isOpen=b.classList.contains('open');
  document.querySelectorAll('.stage-body').forEach(function(x){x.classList.remove('open')});
  document.querySelectorAll('.chev').forEach(function(x){x.classList.remove('open')});
  if(!isOpen){b.classList.add('open');c.classList.add('open');}
}

function buildRoles(){
  var c=document.getElementById('roles-container');
  roles.forEach(function(r){
    var d=document.createElement('div');d.className='rcard';
    var h='<div class="rcard-title" style="color:var(--color-text-primary)">'+r.icon+' '+r.title;
    if(r.title==='Shofer (yangi)') h+='<span class="new-tag">YANGI</span>';
    h+='</div><div class="rcard-list">';
    r.items.forEach(function(item){h+='<div class="ritem">'+item+'</div>';});
    h+='</div>';
    d.innerHTML=h;c.appendChild(d);
  });
}

function buildLogic(){
  var c=document.getElementById('logic-list');
  logics.forEach(function(l){
    var d=document.createElement('div');d.className='logic-item';
    d.innerHTML='<span class="logic-tag '+l.cls+'">'+l.tag+'</span><div class="logic-title">'+l.title+'</div><div class="logic-desc">'+l.desc+'</div>';
    c.appendChild(d);
  });
}

function buildNew(){
  var c=document.getElementById('new-list');
  newFns.forEach(function(l,i){
    var d=document.createElement('div');d.className='logic-item';
    d.innerHTML='<span class="logic-tag '+l.cls+'">'+(i+1)+'. '+l.tag+'</span><div class="logic-title">'+l.title+'</div><div class="logic-desc">'+l.desc+'</div>';
    c.appendChild(d);
  });
}

function sw(id){
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active')});
  document.querySelectorAll('.ttab').forEach(function(t){t.classList.remove('active')});
  document.getElementById('panel-'+id).classList.add('active');
  var map=['stages','roles','logic','new'];
  document.querySelectorAll('.ttab')[map.indexOf(id)].classList.add('active');
}

buildStages();buildRoles();buildLogic();buildNew();
</script>
