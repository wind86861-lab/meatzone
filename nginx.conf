# Redirect plain HTTP → HTTPS
server {
    listen 80;
    server_name vipstroy.uz www.vipstroy.uz;
    return 301 https://vipstroy.uz$request_uri;
}

# HTTPS — main server block
server {
    listen 443 ssl http2;
    server_name vipstroy.uz www.vipstroy.uz;

    # SSL certificate paths (filled in by certbot automatically)
    # NOTE: Run 'certbot --nginx -d vipstroy.uz -d www.vipstroy.uz' to generate new certs
    ssl_certificate     /etc/letsencrypt/live/vipstroy.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vipstroy.uz/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    # Proxy all requests to Node.js
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }
}
